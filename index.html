<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>넷파일 무료회원가입</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background-color: #f5f5f5;
    }
    .banner {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }
    .button-row {
      margin: 20px auto;
    }
    .button-row a {
      display: inline-block;
      padding: 14px 28px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 18px;
    }
    .button-row a:hover {
      background-color: #0056d2;
    }
  </style>
</head>
<body>
  <div class="banner">
    <img src="https://via.placeholder.com/1200x300?text=%EB%B0%B0%EB%84%88+%EC%9D%B4%EB%AF%B8%EC%A7%80" alt="상단 배너 이미지">
  </div>
  <div class="button-row">
    <a href="#">넷파일 무료회원가입하기</a>
  </div>
</body>
</html>
